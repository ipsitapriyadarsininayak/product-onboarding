# Start Spark reporter and where to write it
extent.reporter.spark.start=true
extent.reporter.spark.out=target/extent-reports/Spark.html

# Optional: custom Spark UI config
extent.reporter.spark.config=src/test/resources/spark-config.xml

# Useful metadata
systeminfo.Project=Product-Onboarding
systeminfo.Environment=QA
systeminfo.Browser=Edge

# (Optional) screenshot settings if you attach screenshots
screenshot.dir=target/extent-reports/screenshots
screenshot.rel.path=./screenshots/